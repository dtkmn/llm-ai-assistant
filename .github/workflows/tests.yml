name: Tests

on:
  pull_request:
    branches: [main]
    paths:
      - requirements*.txt
      - pyproject.toml
      - uv.lock
      - src/**
      - tests/**
      - .github/workflows/tests.yml
  push:
    branches: [main, dev]
    paths:
      - requirements*.txt
      - pyproject.toml
      - uv.lock
      - src/**
      - tests/**
      - .github/workflows/tests.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
